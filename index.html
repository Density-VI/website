<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius Hour Escape Room</title>

    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .room {
            padding: 40px;
        }
        .hidden {
            display: none;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }

        #passedScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: lime;
            font-size: 70px;
            font-weight: bold;
            justify-content: center;
            align-items: center;
        }

        #timerDisplay {
            font-size: 22px;
            color: cyan;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            width: 50%;
            color: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #fff;
        }

        th {
            background-color: #333;
        }
    </style>
</head>

<body>

<!-- START PAGE -->
<div id="startPage" class="room">
    <h1>Escape Room Challenge</h1>
    <p>Enter your username to begin:</p>
    <input type="text" id="loginEmail" placeholder="Your email">
    <br>
    <button id="startGameButton">START GAME</button>
    <br><br>
    <button id="leaderboardButton">View Leaderboard</button>
</div>

<!-- TIMER DISPLAY -->
<div id="timerDisplay" class="hidden">Time: 0.00s</div>

<!-- ROOM 1 -->
<div id="room1" class="room hidden">
    <h1>Escape Room - Room 1</h1>
    <p>There are many things you can click...</p>
    <p>Enter the secret code:</p>
    <input type="text" placeholder="Type something...">
    <p>
        <button onclick="alert('if the answer is what you seek you must mute and find peace')">
            If you click this button, you win!
        </button>
    </p>
</div>

<div id="passedScreen">YOU PASSED</div>

<!-- FINISH PAGE -->
<div id="finishPage" class="room hidden">
    <h1>YOU ESCAPED</h1>
    <h2 id="finalTime"></h2>
    <button id="submitScoreButton">Submit Score</button>
    <p id="submitStatus"></p>
</div>

<!-- LEADERBOARD PAGE -->
<div id="leaderboardPage" class="room hidden">
    <h1>🏆 Global Leaderboard</h1>
    <table id="leaderboardTable">
        <tr>
            <th>Rank</th>
            <th>Email</th>
            <th>Score</th>
        </tr>
    </table>
    <br>
    <button id="backButton">Back</button>
</div>

<script>
// Firebase setup
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_STORAGE_BUCKET",
  messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
  appId: "YOUR_APP_ID"
};
const app = firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Global variables
let playerEmail = "";
let startTime;
let timerInterval;
let inactivityTimer;

// Start the game
function beginGame() {
    const emailInput = document.getElementById("loginEmail").value;
    if (!emailInput) {
        alert("Please choose a username.");
        return;
    }

    playerEmail = emailInput;

    document.getElementById("startPage").classList.add("hidden");
    document.getElementById("room1").classList.remove("hidden");
    document.getElementById("timerDisplay").classList.remove("hidden");

    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 10);

    resetIdleTimer();
}

// Update timer display
function updateTimer() {
    let elapsed = (Date.now() - startTime) / 1000;
    document.getElementById("timerDisplay").innerText = "Time: " + elapsed.toFixed(2) + "s";
}

// Stop the timer and return final time
function stopTimer() {
    clearInterval(timerInterval);
    return ((Date.now() - startTime) / 1000).toFixed(2);
}

// Reset idle timer (30 seconds of inactivity)
function resetIdleTimer() {
    clearTimeout(inactivityTimer);
    inactivityTimer = setTimeout(winGame, 30000);
}

document.addEventListener("mousemove", resetIdleTimer);
document.addEventListener("keypress", resetIdleTimer);
document.addEventListener("click", resetIdleTimer);

// Win game (after 30 seconds of inactivity or completing the game)
function winGame() {
    document.getElementById("passedScreen").style.display = "flex";
    setTimeout(() => {
        document.getElementById("passedScreen").style.display = "none";
        document.getElementById("room1").classList.add("hidden");
        document.getElementById("finishPage").classList.remove("hidden");

        let finalTime = stopTimer();
        window.playerScore = finalTime;
        document.getElementById("finalTime").innerText = "Your Time: " + finalTime + " seconds";
    }, 3000);
}

// Submit score to the global leaderboard (Firebase Firestore)
function submitScore() {
    const leaderboardRef = db.collection("leaderboard");

    leaderboardRef.add({
        email: playerEmail,
        score: window.playerScore
    })
    .then(() => {
        document.getElementById("submitStatus").innerText = "Score Submitted Successfully!";
    })
    .catch((error) => {
        document.getElementById("submitStatus").innerText = "Error submitting score: " + error.message;
    });
}

// Show the global leaderboard
function showLeaderboard() {
    document.querySelectorAll(".room").forEach(r => r.classList.add("hidden"));
    document.getElementById("leaderboardPage").classList.remove("hidden");

    // Get leaderboard from Firebase
    db.collection("leaderboard")
        .orderBy("score")
        .limit(10)
        .get()
        .then((querySnapshot) => {
            const leaderboard = querySnapshot.docs.map(doc => doc.data());
            const table = document.getElementById("leaderboardTable");
            table.innerHTML = `
                <tr>
                    <th>Rank</th>
                    <th>Email</th>
                    <th>Score</th>
                </tr>
            `;

            leaderboard.forEach((entry, index) => {
                let row = table.insertRow();
                row.insertCell(0).textContent = index + 1;
                row.insertCell(1).textContent = entry.email;
                row.insertCell(2).textContent = entry.score;
            });
        })
        .catch((error) => {
            console.error("Error fetching leaderboard:", error);
        });
}

// Go back to home (reload the game)
function goHome() {
    location.reload();
}

// Event listeners for buttons
document.getElementById("startGameButton").addEventListener("click", beginGame);
document.getElementById("leaderboardButton").addEventListener("click", showLeaderboard);
document.getElementById("submitScoreButton").addEventListener("click", submitScore);
document.getElementById("backButton").addEventListener("click", goHome);

</script>

</body>
</html>
