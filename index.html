<!DOCTYPE html>
<html>
<head>
    <title>Escape Room</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .room {
            padding: 40px;
        }

        a {
            color: cyan;
            cursor: pointer;
        }

        input {
            padding: 8px;
            margin: 10px;
        }

        #passedScreen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            color: lime;
            font-size: 80px;
            font-weight: bold;
            justify-content: center;
            align-items: center;
        }

        .hidden {
            display: none;
        }

        /* Platformer styles */
        #gameContainer {
            position: relative;
            width: 800px;
            height: 400px;
            margin: 20px auto;
            background-color: #222;
            border: 3px solid #fff;
            overflow: hidden;
        }

        #player {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: red;
        }

        .platform {
            position: absolute;
            height: 20px;
            background-color: #888;
        }
    </style>
</head>
<body>

<!-- ROOM 1 -->
<div id="room1" class="room">
    <h1>Escape Room - Room 1</h1>
    <p>There are many things you can click...</p>
    <p><a onclick="alert('Just a distraction!')">Mysterious Link</a></p>
    <p>Enter the secret code:</p>
    <input type="text" placeholder="Type something...">
    <p><button onclick="alert('Nothing happens... or does it?')">Strange Button</button></p>
</div>

<div id="passedScreen">
    YOU PASSED
</div>

<!-- ROOM 2 -->
<div id="room2" class="room hidden">
    <h1>Escape Room - Room 2: Platformer</h1>
    <p>Fall 5 times to continue!</p>
    <p>Deaths: <span id="deathCount">0</span>/5</p>
    <div id="gameContainer">
        <div id="player"></div>
        <div class="platform" style="top: 300px; left: 50px; width: 200px;"></div>
        <div class="platform" style="top: 250px; left: 300px; width: 150px;"></div>
        <div class="platform" style="top: 200px; left: 500px; width: 200px;"></div>
    </div>
</div>

<script>
    // -------------------
    // ROOM 1 LOGIC
    // -------------------
    let timeout;

    function resetTimer() {
        clearTimeout(timeout);
        timeout = setTimeout(goToRoom2, 30000); // 30 seconds idle
    }

    function goToRoom2() {
        document.getElementById("passedScreen").style.display = "flex";
        setTimeout(function() {
            document.getElementById("passedScreen").style.display = "none";
            document.getElementById("room1").classList.add("hidden");
            document.getElementById("room2").classList.remove("hidden");
            startPlatformer();
        }, 3000);
    }

    document.addEventListener("mousemove", resetTimer);
    document.addEventListener("keypress", resetTimer);
    document.addEventListener("click", resetTimer);

    resetTimer(); // start timer on load

    // -------------------
    // ROOM 2 PLATFORMER
    // -------------------
    function startPlatformer() {
        const player = document.getElementById("player");
        const platforms = document.querySelectorAll(".platform");
        const deathDisplay = document.getElementById("deathCount");
        let left = 50;
        let bottom = 300; // start on first platform
        let velocityY = 0;
        const gravity = -0.5;
        const moveSpeed = 5;
        let keys = {};
        let deaths = 0;
        const maxDeaths = 5;
        let room3Loaded = false; // prevent multiple loads

        // place player on first platform
        player.style.left = left + "px";
        player.style.bottom = bottom + "px";

        document.addEventListener("keydown", e => keys[e.key] = true);
        document.addEventListener("keyup", e => keys[e.key] = false);

        function resetPlayer() {
            if (room3Loaded) return;
            left = 50;
            bottom = 300;
            velocityY = 0;
            deaths++;
            deathDisplay.textContent = deaths;
            if (deaths >= maxDeaths) {
                room3Loaded = true;
                alert("You died 5 times! Moving to Room 3...");
                loadRoom3();
            }
        }

        function gameLoop() {
            if (room3Loaded) return;

            // Horizontal movement
            if (keys["ArrowLeft"]) left -= moveSpeed;
            if (keys["ArrowRight"]) left += moveSpeed;

            // Gravity
            velocityY += gravity;
            bottom += velocityY;

            // Fell off screen
            if (bottom < -50) resetPlayer();

            // Platform collisions
            platforms.forEach(p => {
                const pTop = p.offsetTop;
                const pLeft = p.offsetLeft;
                const pRight = pLeft + p.offsetWidth;
                const pBottom = pTop + p.offsetHeight;

                if (
                    left + 40 > pLeft && left < pRight &&
                    bottom <= pBottom && bottom + 40 >= pTop &&
                    velocityY <= 0
                ) {
                    bottom = pTop + p.offsetHeight;
                    velocityY = 0;
                }
            });

            // Jump
            if (keys["ArrowUp"] && velocityY === 0) velocityY = 10;

            // Update player
            player.style.left = left + "px";
            player.style.bottom = bottom + "px";

            requestAnimationFrame(gameLoop);
        }

        gameLoop();

        function loadRoom3() {
            document.getElementById("room2").classList.add("hidden");
            const room3 = document.createElement("div");
            room3.id = "room3";
            room3.className = "room";
            room3.innerHTML = "<h1>Room 3</h1><p>Congrats! You escaped Room 2.</p>";
            document.body.appendChild(room3);
        }
    }
</script>

</body>
</html>
