<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, orderBy, limit } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* 🔥 YOUR FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "PASTE_KEY",
  authDomain: "PASTE_AUTH_DOMAIN",
  projectId: "PASTE_PROJECT_ID",
  storageBucket: "PASTE_BUCKET",
  messagingSenderId: "PASTE_ID",
  appId: "PASTE_APP_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ---------------- GAME STATE ---------------- */

let playerEmail = "";
let startTime = null;
let timerInterval = null;
let inactivityTimer = null;
let gameStarted = false;

/* ---------------- START GAME ---------------- */

window.beginGame = function() {

    const emailInput = document.getElementById("loginEmail").value.trim();

    if (!emailInput) {
        alert("Enter email first");
        return;
    }

    if (gameStarted) return; // prevents double start

    gameStarted = true;
    playerEmail = emailInput;

    document.getElementById("startPage").classList.add("hidden");
    document.getElementById("room1").classList.remove("hidden");
    document.getElementById("timerDisplay").classList.remove("hidden");

    startTimer();
};

/* ---------------- TIMER ---------------- */

function startTimer() {
    startTime = Date.now();

    timerInterval = setInterval(() => {
        const elapsed = (Date.now() - startTime) / 1000;
        document.getElementById("timerDisplay").innerText =
            "Time: " + elapsed.toFixed(2) + "s";
    }, 10);

    startIdleCountdown();
}

function stopTimer() {
    clearInterval(timerInterval);
    clearTimeout(inactivityTimer);
}

/* ---------------- ROOM 1 IDLE WIN ---------------- */

function startIdleCountdown() {
    inactivityTimer = setTimeout(winGame, 30000);
}

/* ---------------- WIN GAME ---------------- */

function winGame() {

    stopTimer();

    document.getElementById("passedScreen").style.display = "flex";

    setTimeout(() => {
        document.getElementById("passedScreen").style.display = "none";
        document.getElementById("room1").classList.add("hidden");
        document.getElementById("finishPage").classList.remove("hidden");

        const finalTime = ((Date.now() - startTime) / 1000).toFixed(2);
        window.playerScore = parseFloat(finalTime);

        document.getElementById("finalTime").innerText =
            "Your Time: " + finalTime + " seconds";
    }, 3000);
}

/* ---------------- SAVE SCORE ---------------- */

window.saveScore = async function() {

    await addDoc(collection(db, "scores"), {
        email: playerEmail,
        time: window.playerScore,
        created: Date.now()
    });

    showLeaderboard();
};

/* ---------------- SHOW LEADERBOARD ---------------- */

window.showLeaderboard = async function() {

    document.querySelectorAll(".room").forEach(r => r.classList.add("hidden"));
    document.getElementById("leaderboardPage").classList.remove("hidden");

    const table = document.getElementById("leaderboardTable");

    table.innerHTML = `
        <tr>
            <th>Rank</th>
            <th>Email</th>
            <th>Time (s)</th>
        </tr>
    `;

    const q = query(collection(db, "scores"), orderBy("time"), limit(10));
    const snapshot = await getDocs(q);

    let rank = 1;

    snapshot.forEach(doc => {
        const data = doc.data();
        table.innerHTML += `
            <tr>
                <td>${rank++}</td>
                <td>${data.email}</td>
                <td>${data.time.toFixed(2)}</td>
            </tr>
        `;
    });
};

/* ---------------- BACK HOME ---------------- */

window.goHome = function() {
    location.reload(); // full reset
};

</script>
