<!DOCTYPE html>
<html>
<head>
<title>Escape Room Challenge</title>

<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#111;
    color:white;
    text-align:center;
}
.room{ padding:40px; }
.hidden{ display:none; }
button{ padding:10px 20px; margin:10px; }
input{ padding:10px; margin:10px; }

#gameContainer{
    position:relative;
    width:800px;
    height:400px;
    margin:20px auto;
    background:#222;
    border:3px solid white;
    overflow:hidden;
}
#player{
    position:absolute;
    width:40px;
    height:40px;
    background:red;
}
.platform{
    position:absolute;
    height:20px;
    background:#888;
}
#greenTrap{
    position:absolute;
    width:50px;
    height:50px;
    background:green;
}
#timerDisplay{
    font-size:24px;
    color:lime;
}
</style>
</head>

<body>

<!-- START PAGE -->
<div id="startPage" class="room">
    <h1>Ultimate Escape Room</h1>
    <p>Can you beat it?</p>
    <button onclick="startGame()">START</button>
</div>

<!-- TIMER DISPLAY -->
<div id="timerDisplay" class="hidden">Time: 0.00s</div>

<!-- ROOM 1 -->
<div id="room1" class="room hidden">
    <h1>Room 1</h1>
    <p>Wait patiently...</p>
</div>

<!-- ROOM 2 -->
<div id="room2" class="room hidden">
    <h1>Room 2 - Platformer</h1>
    <div id="gameContainer">
        <div id="player"></div>
        <div class="platform" style="top:350px; left:0px; width:200px;"></div>
        <div class="platform" style="top:300px; left:250px; width:200px;"></div>
        <div class="platform" style="top:250px; left:500px; width:200px;"></div>
        <div id="greenTrap" style="top:200px; left:750px;"></div>
    </div>
</div>

<!-- FINISH PAGE -->
<div id="finishPage" class="room hidden">
    <h1>YOU ESCAPED</h1>
    <h2 id="finalTime"></h2>
    <p>Enter your email to submit your score:</p>
    <input type="email" id="playerEmail" placeholder="Your Email">
    <button onclick="sendScore()">Submit Score</button>
    <p id="submitStatus"></p>
</div>

<script>
emailjs.init("YOUR_PUBLIC_KEY"); // replace this

let startTime;
let timerInterval;

function startGame(){
    document.getElementById("startPage").classList.add("hidden");
    document.getElementById("room1").classList.remove("hidden");
    document.getElementById("timerDisplay").classList.remove("hidden");

    startTime = Date.now();
    timerInterval = setInterval(updateTimer,10);

    setTimeout(()=>{
        document.getElementById("room1").classList.add("hidden");
        document.getElementById("room2").classList.remove("hidden");
        startPlatformer();
    },5000);
}

function updateTimer(){
    let elapsed = (Date.now() - startTime)/1000;
    document.getElementById("timerDisplay").innerText = "Time: " + elapsed.toFixed(2) + "s";
}

function stopTimer(){
    clearInterval(timerInterval);
    return ((Date.now()-startTime)/1000).toFixed(2);
}

function startPlatformer(){
    const player = document.getElementById("player");
    const trap = document.getElementById("greenTrap");

    let left=0;
    let bottom=350;
    let velocityY=0;
    const gravity=-0.5;
    const moveSpeed=5;
    let keys={};

    player.style.left=left+"px";
    player.style.bottom=bottom+"px";

    document.addEventListener("keydown",e=>keys[e.key]=true);
    document.addEventListener("keyup",e=>keys[e.key]=false);

    function loop(){
        if(keys["ArrowLeft"]) left-=moveSpeed;
        if(keys["ArrowRight"]) left+=moveSpeed;

        velocityY+=gravity;
        bottom+=velocityY;

        if(bottom<0) bottom=0;

        if(keys["ArrowUp"] && velocityY===0) velocityY=10;

        player.style.left=left+"px";
        player.style.bottom=bottom+"px";

        if(player.getBoundingClientRect().right >
           trap.getBoundingClientRect().left){
            finishGame();
            return;
        }

        requestAnimationFrame(loop);
    }
    loop();
}

function finishGame(){
    document.getElementById("room2").classList.add("hidden");
    document.getElementById("finishPage").classList.remove("hidden");

    let finalTime = stopTimer();
    document.getElementById("finalTime").innerText =
        "Your Time: " + finalTime + " seconds";

    window.playerScore = finalTime;
}

function sendScore(){
    let email = document.getElementById("playerEmail").value;
    if(!email){
        alert("Enter email first");
        return;
    }

    emailjs.send("YOUR_SERVICE_ID","YOUR_TEMPLATE_ID",{
        to_email: "YOUR_EMAIL@gmail.com",
        player_email: email,
        score: window.playerScore
    }).then(()=>{
        document.getElementById("submitStatus").innerText =
            "Score Submitted Successfully!";
    },()=>{
        document.getElementById("submitStatus").innerText =
            "Error sending score.";
    });
}
</script>

</body>
</html>
