<!DOCTYPE html>
<html>
<head>
<title>Escape Room Online</title>

<!-- Firebase v8 -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<style>
body { font-family: Arial; background:#111; color:white; text-align:center; margin:0; }
.room { padding:40px; }
.hidden { display:none; }
input, button { padding:10px; margin:10px; }

#passedScreen {
    display:none; position:fixed; top:0; left:0;
    width:100%; height:100%; background:black; color:lime;
    font-size:70px; font-weight:bold; justify-content:center; align-items:center;
}

#timerDisplay { font-size:22px; color:cyan; }

table { margin:20px auto; border-collapse: collapse; width:60%; }
th, td { border:1px solid white; padding:10px; }
th { background:#333; }
</style>
</head>
<body>

<!-- START PAGE -->
<div id="startPage" class="room">
    <h1>Escape Room Online</h1>
    <p>Enter your email to begin:</p>
    <input type="email" id="loginEmail" placeholder="Your Email">
    <br>
    <button onclick="beginGame()">START GAME</button>
    <br><br>
    <button onclick="showLeaderboard()">View Leaderboard</button>
</div>

<div id="timerDisplay" class="hidden">Time: 0.00s</div>

<!-- ROOM 1 -->
<div id="room1" class="room hidden">
    <h1>Room 1</h1>
    <p>Wait patiently...</p>
</div>

<div id="passedScreen">YOU PASSED</div>

<!-- FINISH PAGE -->
<div id="finishPage" class="room hidden">
    <h1>YOU ESCAPED</h1>
    <h2 id="finalTime"></h2>
    <button onclick="saveScore()">Save Score</button>
</div>

<!-- LEADERBOARD PAGE -->
<div id="leaderboardPage" class="room hidden">
    <h1>🏆 Global Leaderboard</h1>
    <table id="leaderboardTable">
        <tr>
            <th>Rank</th>
            <th>Email</th>
            <th>Time (s)</th>
        </tr>
    </table>
    <br>
    <button onclick="goHome()">Back</button>
</div>

<script>
// ----------------- FIREBASE -----------------
var firebaseConfig = {
  apiKey: "PASTE_YOUR_KEY_HERE",
  authDomain: "PASTE_YOUR_AUTH_DOMAIN",
  projectId: "PASTE_YOUR_PROJECT_ID",
  storageBucket: "PASTE_YOUR_BUCKET",
  messagingSenderId: "PASTE_YOUR_MESSAGING_ID",
  appId: "PASTE_YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.firestore();

// ----------------- GAME STATE -----------------
var playerEmail = "";
var startTime = null;
var timerInterval = null;
var inactivityTimer = null;
var gameStarted = false;

// ----------------- START GAME -----------------
function beginGame() {
    var emailInput = document.getElementById("loginEmail").value.trim();
    if (!emailInput) {
        alert("Enter email first");
        return;
    }
    if (gameStarted) return;

    gameStarted = true;
    playerEmail = emailInput;

    document.getElementById("startPage").classList.add("hidden");
    document.getElementById("room1").classList.remove("hidden");
    document.getElementById("timerDisplay").classList.remove("hidden");

    startTimer();
}

// ----------------- TIMER -----------------
function startTimer() {
    startTime = Date.now();
    timerInterval = setInterval(function(){
        var elapsed = (Date.now() - startTime)/1000;
        document.getElementById("timerDisplay").innerText = "Time: " + elapsed.toFixed(2) + "s";
    },10);

    inactivityTimer = setTimeout(winGame, 30000); // 30 seconds idle win
}

function stopTimer() {
    clearInterval(timerInterval);
    clearTimeout(inactivityTimer);
}

// ----------------- WIN GAME -----------------
function winGame() {
    stopTimer();

    document.getElementById("passedScreen").style.display = "flex";

    setTimeout(function(){
        document.getElementById("passedScreen").style.display = "none";
        document.getElementById("room1").classList.add("hidden");
        document.getElementById("finishPage").classList.remove("hidden");

        var finalTime = ((Date.now() - startTime)/1000).toFixed(2);
        window.playerScore = parseFloat(finalTime);
        document.getElementById("finalTime").innerText = "Your Time: " + finalTime + " seconds";
    },3000);
}

// ----------------- SAVE SCORE -----------------
function saveScore() {
    db.collection("scores").add({
        email: playerEmail,
        time: window.playerScore,
        created: Date.now()
    }).then(function(){
        showLeaderboard();
    }).catch(function(error){
        alert("Error saving score: "+error);
    });
}

// ----------------- SHOW LEADERBOARD -----------------
function showLeaderboard() {
    document.querySelectorAll(".room").forEach(r=>r.classList.add("hidden"));
    document.getElementById("leaderboardPage").classList.remove("hidden");

    var table = document.getElementById("leaderboardTable");
    table.innerHTML = `
        <tr>
            <th>Rank</th>
            <th>Email</th>
            <th>Time (s)</th>
        </tr>
    `;

    db.collection("scores").orderBy("time").limit(10).get()
    .then(function(snapshot){
        var rank = 1;
        snapshot.forEach(function(doc){
            var data = doc.data();
            table.innerHTML += `
                <tr>
                    <td>${rank++}</td>
                    <td>${data.email}</td>
                    <td>${data.time.toFixed(2)}</td>
                </tr>
            `;
        });
    });
}

// ----------------- BACK HOME -----------------
function goHome() {
    location.reload(); // reset everything
}

</script>

</body>
</html>
